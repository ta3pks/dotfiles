theme="onedark"
[editor]
idle-timeout = 50
line-number="relative"
statusline = {left =["mode", "spinner", "file-name","version-control"] }
lsp= { display-inlay-hints=true }
file-picker = { hidden = false }
[keys.normal."C-w"]
C-o = ":o ~/.config/helix/languages.toml"
C-s = ":config-open" 
C-r = ":config-reload"
[keys.insert]
"C-." = "signature_help"
